services:
  # ── Backend API Server ───────────────────────────────────────────────────────
  - type: web
    name: tablebook-api
    runtime: node
    region: singapore
    plan: starter
    buildCommand: pnpm install && pnpm build:server
    startCommand: node dist/server/_core/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # ── Fill these in Render Dashboard → Environment ──────────────────────
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  # ── Public Booking Page (Static Site) ────────────────────────────────────────
  - type: web
    name: tablebook-booking
    runtime: static
    plan: starter
    buildCommand: npx expo export --platform web
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
